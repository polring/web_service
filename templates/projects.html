{% extends "base.html" %}

{% block content %}
  <div class="grid">
    {% for project in projects %}
      <div class="project-card">
        <h3>{{ project.title }}</h3>
        <p>{{ project.description }}</p>
        {% if project.link %}
          <a class="project-link" href="{{ project.link }}" target="_blank" rel="noopener noreferrer">GitHub 링크</a>
        {% endif %}
      </div>
    {% endfor %}
  </div>
{% endblock %}
