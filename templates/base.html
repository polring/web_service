<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Georgia", "Times New Roman", serif;
        background: linear-gradient(140deg, #f7f0e8 0%, #e8f0f7 100%);
        color: #1a1a1a;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .wrap {
        max-width: 920px;
        margin: 0 auto;
        padding: 48px 24px 96px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 32px;
      }
      .brand {
        font-weight: 700;
        letter-spacing: 0.4px;
      }
      nav {
        display: flex;
        gap: 16px;
        font-size: 16px;
      }
      nav a {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid transparent;
      }
      nav a:hover {
        border-color: #c8c8c8;
        background: #ffffffa6;
      }
      h1 {
        font-size: 42px;
        line-height: 1.1;
        margin: 0 0 12px;
      }
      p {
        font-size: 18px;
        line-height: 1.7;
        margin: 0 0 16px;
      }
      .lead {
        font-size: 19px;
        color: #333333;
      }
      .card {
        background: #ffffffcc;
        border: 1px solid #e6e6e6;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
      }
      ul {
        margin: 12px 0 0 18px;
        padding: 0;
        font-size: 17px;
      }
      li {
        margin-bottom: 8px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        margin-top: 16px;
      }
      .pill {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        background: #111111;
        color: #ffffff;
        font-size: 13px;
        letter-spacing: 0.4px;
      }
      .project-card h3 {
        margin-top: 0;
      }
      .project-link {
        display: inline-block;
        margin-top: 8px;
        font-size: 15px;
        text-decoration: underline;
      }
      @media (max-width: 640px) {
        header {
          flex-direction: column;
          align-items: flex-start;
        }
        h1 {
          font-size: 34px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="brand">MINJE PORTFOLIO</div>
        <nav>
          <a href="/">소개</a>
          <a href="/skills">기술</a>
          <a href="/projects">프로젝트</a>
          <a href="/contact">연락</a>
        </nav>
      </header>
      <h1>{{ title }}</h1>
      <p class="lead">{{ lead }}</p>
      <div class="card">
        {% block content %}{% endblock %}
      </div>
    </div>
  </body>
</html>
